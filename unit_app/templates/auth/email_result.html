<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .success .icon {
            color: #22c55e;
        }

        .error .icon {
            color: #ef4444;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            font-size: 15px;
            color: #555;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4338ca;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card {{ status }}">
    {% if status == "success" %}
        <div class="icon">✅</div>
    {% else %}
        <div class="icon">❌</div>
    {% endif %}

    <h2>{{ title }}</h2>
    <p>{{ message }}</p>

    {% if status == "success" %}
        <a href="https://vincab.services" class="btn">Go to Login</a>
    {% else %}
        <a href="mailto:support@vincab.services" class="btn">Contact Support</a>
    {% endif %}
</div>

</body>
</html>
