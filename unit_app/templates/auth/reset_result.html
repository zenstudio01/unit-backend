<!DOCTYPE html>
<html>
<head>
    <title>Password Reset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
        }

        .card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .success { color: green; font-size: 50px; }
        .error { color: red; font-size: 50px; }

        p {
            margin-top: 10px;
            color: #555;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="card">
    {% if status == "success" %}
        <div class="success">✔</div>
    {% else %}
        <div class="error">✖</div>
    {% endif %}

    <h2>{{ message }}</h2>

    <a href="https://vincab.services">Go to Login</a>
</div>

</body>
</html>
